version: '3.8'

services:
  # MongoDB Datenbank
  mongodb:
    image: docker.io/library/mongo:7.0
    container_name: campusnow-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: campusnow_secret_2025
      MONGO_INITDB_DATABASE: campusnow
    volumes:
      - ./data/db:/data/db
      - ./scripts/init_db.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - campusnow-net
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh -u admin -p campusnow_secret_2025
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Scraper Service
  scraper:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: campusnow-scraper
    environment:
      MONGO_URI: mongodb://admin:campusnow_secret_2025@mongodb:27017/campusnow?authSource=admin
      MONGO_DB: campusnow
      MONGO_USER: admin
      MONGO_PASSWORD: campusnow_secret_2025
      LOG_LEVEL: INFO
      TZ: Europe/Berlin
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./data/images/360:/app/data/images/360
      - ./scraper-service:/app
    networks:
      - campusnow-net
    restart: unless-stopped

  # REST API Service
  api:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: campusnow-api
    ports:
      - "6058:8000"
    environment:
      MONGO_URI: mongodb://admin:campusnow_secret_2025@mongodb:27017/campusnow?authSource=admin
      MONGO_DB: campusnow
      API_TITLE: "CampusNow API"
      API_VERSION: "1.0.0"
      CORS_ORIGINS: "*"
      LOG_LEVEL: INFO
      TZ: Europe/Berlin
    depends_on:
      - mongodb
    volumes:
      - ./data/images/360:/app/data/images/360
      - ./api-service:/app
    networks:
      - campusnow-net
    restart: unless-stopped

  # One-shot Mock Seeder (keine Timetable-Daten)
  mock-seeder:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: campusnow-mock-seeder
    command: ["python", "seed_mock_data.py"]
    environment:
      MONGO_URI: mongodb://admin:campusnow_secret_2025@mongodb:27017/campusnow?authSource=admin
      MONGO_DB: campusnow
      MOCK_ROOM_ID: MOCK-R1
      MOCK_BUILDING_ID: AH
      MOCK_EVENT_TITLE: Mock Campus Event
      TZ: Europe/Berlin
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./data/images/360:/app/data/images/360
      - ./api-service:/app
    networks:
      - campusnow-net
    profiles:
      - seed
    restart: "no"

networks:
  campusnow-net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
