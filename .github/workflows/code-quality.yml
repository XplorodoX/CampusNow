name: Code Quality Analysis

on:
  # Nach erfolgreichem CI nur auf develop & main
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main, develop]
  # Manuelle Auslösung ermöglichen
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          cd scraper-service && pip install -r requirements.txt
          cd ../api-service && pip install -r requirements.txt
          cd ..
          pip install ruff flake8 black pylint pytest pytest-cov radon
          
      - name: Check Code Complexity (Radon)
        run: |
          echo "📊 Analyzing code complexity..."
          radon cc scraper-service api-service -a -nb || true
          radon metrics scraper-service api-service -nb || true
          
      - name: Run Static Analysis (Pylint)
        continue-on-error: true
        run: |
          echo "🔎 Running Pylint static analysis..."
          pylint scraper-service/scraper/*.py api-service/app/*.py --exit-zero --output-format=parseable
          
      - name: Test Coverage Analysis
        run: |
          echo "📈 Generating coverage report..."
          cd api-service
          python -m pytest --cov=app --cov-report=term-missing:skip-covered --cov-report=html -v || true
          
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: api-service/htmlcov/
          
  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install pip-audit
        run: pip install pip-audit
        
      - name: Check for vulnerable dependencies
        continue-on-error: true
        run: |
          echo "🔐 Checking for vulnerabilities in dependencies..."
          pip-audit || true
